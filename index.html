<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Storyboard Cinematic</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel (Untuk menerjemahkan React JSX langsung di Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white selection:bg-[#FFC000]/30 overflow-x-hidden">
    <!-- Tempat Aplikasi React akan muncul -->
    <div id="root"></div>

    <!-- Kode Utama Aplikasi -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        // === KAMUS VISUAL HANTU LOKAL (MISTIK NUSANTARA) ===
        const GHOST_PROMPTS = {
          "Pocong": "A terrifying figure wrapped tightly in a dirty, soil-stained white burial shroud (kain kafan), tied at the head, neck, and feet. Its face is decaying, dark, with glowing hollow eyes.",
          "Kuntilanak": "A ghastly female spirit with long, disheveled black hair covering parts of her pale, decaying face. She wears a long, tattered, dirty white dress covered in faint bloodstains.",
          "Genderuwo": "A massive, towering humanoid creature covered in thick, dark, matted hair. It has glowing red eyes, sharp fangs protruding from its mouth, and long sharp claws.",
          "Tuyul": "A small, pale, child-like entity with a completely bald head. Its skin is slightly translucent and grayish, wearing only a small, dirty loincloth.",
          "Sundel Bolong": "A horrifying female spirit similar to Kuntilanak, wearing a long white dress, but with a massive, gory, gaping hole in her back revealing her decaying internal organs and spine.",
          "Kuyang": "A terrifying female vampire appearing as a floating human head with dangling, pulsating veins, lungs, and stomach, glowing with a faint eerie red light.",
          "Leak Bali": "A terrifying Balinese black magic practitioner manifesting as a floating severed head with glowing eyes, huge sharp fangs, and a long tongue, with internal organs trailing beneath it.",
          "Wewe Gombel": "An old, terrifying hag with long, disheveled hair, extremely long and sagging breasts that reach her stomach, wearing tattered traditional clothing.",
          "Jelangkung": "A creepy, traditional Indonesian spirit-summoning doll made from a coconut shell head and wooden cross stick body, draped in small, dirty, tattered doll clothes.",
          "Banaspati": "A terrifying, floating ball of aggressive, cursed fire that burns with unnatural dark orange and crimson flames, sometimes briefly revealing a screaming, demonic skull inside.",
          "Jenglot": "A tiny, terrifying mummified humanoid creature with long, unkempt black hair, sharp fangs protruding from a tiny decaying mouth, and incredibly long, sharp fingernails.",
          "Babi Ngepet": "A monstrous, demonic boar with glowing red eyes, covered in unnatural dark, bristly fur, emanating a dark aura, associated with dark magic and greed."
        };

        // === HELPER UNTUK INDEXEDDB ===
        const DB_NAME = 'AilabsDB';
        const STORE_NAME = 'projects';

        const initDB = () => {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (event) => {
              const db = event.target.result;
              if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME);
              }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
          });
        };

        const saveToIDB = async (key, data) => {
          try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
              const transaction = db.transaction(STORE_NAME, 'readwrite');
              const store = transaction.objectStore(STORE_NAME);
              const request = store.put(data, key);
              request.onsuccess = () => resolve();
              request.onerror = () => reject(request.error);
            });
          } catch (err) { console.error("IDB Save Error:", err); }
        };

        const getFromIDB = async (key) => {
          try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
              const transaction = db.transaction(STORE_NAME, 'readonly');
              const store = transaction.objectStore(STORE_NAME);
              const request = store.get(key);
              request.onsuccess = () => resolve(request.result);
              request.onerror = () => reject(request.error);
            });
          } catch (err) { return null; }
        };

        const compressImageBase64 = (base64Str, maxWidth = 150) => {
          return new Promise((resolve) => {
            if (!base64Str) { resolve(null); return; }
            const img = new Image();
            img.src = base64Str;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const scaleSize = maxWidth / img.width;
              canvas.width = maxWidth; canvas.height = img.height * scaleSize;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/jpeg', 0.3));
            };
            img.onerror = () => resolve(null);
          });
        };

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgYCCYXKE1RPLdUCeq3Lv7rqGaOPkl19P9LmsiXDFuAWNpgtlHI2-NWoJ85v10QuDVOw/exec";

        // === FIREBASE INIT SETUP AMAN ===
        let app, auth, db;
        try {
            let firebaseConfig;
            // Gunakan fallback jika tidak ada injected config (Misal sedang jalan di Vercel)
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
            } else {
                // TODO: Jika kamu mau fitur Cloud Save (Histori) jalan di Vercel, 
                // masukkan config dari Firebase Console kamu di sini:
                firebaseConfig = {
                    apiKey: "YOUR_API_KEY_HERE",
                    authDomain: "your-app.firebaseapp.com",
                    projectId: "your-project-id",
                    storageBucket: "your-app.appspot.com",
                    messagingSenderId: "123456789",
                    appId: "1:1234567:web:abcdef"
                };
            }
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) { console.warn("Firebase belum disetting dengan benar, fitur cloud akan dinonaktifkan.", e); }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const App = () => {
          const [loginEmail, setLoginEmail] = useState("");
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [hasAccess, setHasAccess] = useState(false);
          const [isCheckingAccess, setIsCheckingAccess] = useState(false);
          const [loginError, setLoginError] = useState("");
          const [activeUsername, setActiveUsername] = useState("");
          const [activeEmail, setActiveEmail] = useState("");

          const [idea, setIdea] = useState("");
          const [sceneRevision, setSceneRevision] = useState("");
          const [genre, setGenre] = useState("Action High-Octane");
          const [characterCount, setCharacterCount] = useState("Otomatis"); 
          const [isAlternatingCharacters, setIsAlternatingCharacters] = useState(false);
          const [partCount, setPartCount] = useState("Otomatis"); 
          const [aspectRatio, setAspectRatio] = useState("16:9"); 
          const [storyboard, setStoryboard] = useState([]);
          
          const [globalFaceRefs, setGlobalFaceRefs] = useState({ A: [], B: [], C: [], D: [], E: [] });
          const [additionalAssetRefs, setAdditionalAssetRefs] = useState({ 1: [], 2: [], 3: [], 4: [], 5: [] });
          const [selectedGhosts, setSelectedGhosts] = useState([]);

          const [isGeneratingStoryboard, setIsGeneratingStoryboard] = useState(false);
          const [isExtendingStoryboard, setIsExtendingStoryboard] = useState(false); 
          const [extendPartCount, setExtendPartCount] = useState(2); 
          const [generatingImages, setGeneratingImages] = useState({}); 
          const [generatingVideos, setGeneratingVideos] = useState({});
          const [videoEngines, setVideoEngines] = useState({}); 
          
          const [isGeneratingAllImages, setIsGeneratingAllImages] = useState(false);
          const [imageRevisionInputs, setImageRevisionInputs] = useState({});
          const [motionRevisionInputs, setMotionRevisionInputs] = useState({});

          const [previewImage, setPreviewImage] = useState(null);
          const [previewVideo, setPreviewVideo] = useState(null); 
          const [error, setError] = useState("");

          const [isHistoryOpen, setIsHistoryOpen] = useState(false);
          const [projectHistory, setProjectHistory] = useState([]);
          const [historySuccessMsg, setHistorySuccessMsg] = useState("");

          const [copiedStates, setCopiedStates] = useState({});
          const [showVideoPreview, setShowVideoPreview] = useState({});
          const [user, setUser] = useState(null);

          const bangProLogoUrl = "https://i.ibb.co.com/pvp9g29x/Whats-App-Image-2025-12-25-at-02-28-36.jpg"; 

          useEffect(() => {
            const initAuth = async () => {
              if(!auth) return; // Skip if Firebase is not setup
              try {
                  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                  } else {
                    await signInAnonymously(auth);
                  }
              } catch(e) {}
            };
            initAuth();
            if(auth) {
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }
          }, []);

          useEffect(() => {
            const savedSession = localStorage.getItem("ailabs_session");
            if (savedSession) {
              try {
                const parsed = JSON.parse(savedSession);
                if (parsed && parsed.email) {
                  setLoginEmail(parsed.email); setActiveEmail(parsed.email); setActiveUsername(parsed.username);
                  setIsLoggedIn(true); setHasAccess(true);
                }
              } catch (e) { console.error(e); }
            }
          }, []);

          useEffect(() => {
            const loadDraft = async () => {
              const parsed = await getFromIDB("ailabs_project_draft");
              if (parsed) {
                if (parsed.idea) setIdea(parsed.idea);
                if (parsed.sceneRevision) setSceneRevision(parsed.sceneRevision);
                if (parsed.genre) setGenre(parsed.genre);
                if (parsed.characterCount) setCharacterCount(parsed.characterCount);
                if (parsed.isAlternatingCharacters !== undefined) setIsAlternatingCharacters(parsed.isAlternatingCharacters);
                if (parsed.partCount) setPartCount(parsed.partCount);
                if (parsed.aspectRatio) setAspectRatio(parsed.aspectRatio);
                if (parsed.storyboard) setStoryboard(parsed.storyboard);
                if (parsed.selectedGhosts) setSelectedGhosts(parsed.selectedGhosts);
                if (parsed.globalFaceRefs) setGlobalFaceRefs(parsed.globalFaceRefs);
                if (parsed.additionalAssetRefs) setAdditionalAssetRefs(parsed.additionalAssetRefs);
                if (parsed.imageRevisionInputs) setImageRevisionInputs(parsed.imageRevisionInputs);
                if (parsed.motionRevisionInputs) setMotionRevisionInputs(parsed.motionRevisionInputs);
                if (parsed.videoEngines) setVideoEngines(parsed.videoEngines); 
              }
            };
            loadDraft();
          }, []);

          useEffect(() => {
            const projectData = { idea, sceneRevision, genre, characterCount, isAlternatingCharacters, partCount, aspectRatio, storyboard, selectedGhosts, globalFaceRefs, additionalAssetRefs, imageRevisionInputs, motionRevisionInputs, videoEngines };
            saveToIDB("ailabs_project_draft", projectData);
          }, [idea, sceneRevision, genre, characterCount, isAlternatingCharacters, partCount, aspectRatio, storyboard, selectedGhosts, globalFaceRefs, additionalAssetRefs, imageRevisionInputs, motionRevisionInputs, videoEngines]);

          useEffect(() => {
            if (!user || !db) return;
            const historyRef = collection(db, 'artifacts', appId, 'users', user.uid, 'history');
            const unsubscribe = onSnapshot(
              historyRef,
              (snapshot) => {
                const historyData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                historyData.sort((a, b) => b.timestamp - a.timestamp);
                setProjectHistory(historyData);
              },
              (error) => console.error("Gagal memuat histori:", error)
            );
            return () => unsubscribe();
          }, [user]);

          const handleLogin = async (e) => {
            e.preventDefault();
            if (!loginEmail.trim()) { setLoginError("Masukkan Email Gmail dulu brow!"); return; }
            setLoginError(""); setIsCheckingAccess(true);
            try {
              const response = await fetch(`${GOOGLE_SCRIPT_URL}?email=${encodeURIComponent(loginEmail)}`);
              const data = await response.json();
              if (data.success) {
                setIsLoggedIn(true); setHasAccess(true); setActiveUsername(data.username); setActiveEmail(data.email);
                localStorage.setItem("ailabs_session", JSON.stringify({ email: data.email, username: data.username }));
              } else { setLoginError(data.message || "Akses Ditolak! Email tidak cocok."); }
            } catch (err) { setLoginError("Gagal terhubung ke server database."); } 
            finally { setIsCheckingAccess(false); }
          };

          const handleLogout = () => {
            setIsLoggedIn(false); setHasAccess(false); setLoginEmail(""); setActiveUsername(""); setActiveEmail("");
            localStorage.removeItem("ailabs_session");
          };

          const saveToHistory = async () => {
            if (!user || !db) { setError("Fitur Histori Cloud tidak aktif karena Firebase Config kosong di Vercel."); return; }
            if (!idea.trim() && storyboard.length === 0) { setError("Isi ide atau buat storyboard dulu."); return; }

            setError(""); setHistorySuccessMsg("Mengompres gambar untuk Cloud... Mohon tunggu.");
            const safeStoryboard = await Promise.all(storyboard.map(async (s) => {
              const thumbnail = s.imageUrl ? await compressImageBase64(s.imageUrl, 150) : null;
              return { shotNumber: s.shotNumber || "Scene", imagePrompt: s.imagePrompt || "", motionPrompt: s.motionPrompt || "", imageUrl: thumbnail, videoUrl: s.videoUrl || null };
            }));

            const timestamp = Date.now();
            const historyId = timestamp.toString();
            const fullEntry = { timestamp, date: new Date().toLocaleString('id-ID'), idea, sceneRevision, genre, partCount, characterCount, aspectRatio, storyboard: safeStoryboard };

            try {
              const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'history', historyId);
              await setDoc(docRef, fullEntry);
              setError(""); setHistorySuccessMsg("Disimpan ke Cloud!");
              setTimeout(() => setHistorySuccessMsg(""), 4000);
            } catch (e) { setError("🚨 GAGAL MENYIMPAN KE CLOUD!"); }
          };

          const loadFromHistory = (entry) => {
            setIdea(entry.idea || ""); setSceneRevision(entry.sceneRevision || ""); setGenre(entry.genre || "Action High-Octane"); 
            setCharacterCount(entry.characterCount || "Otomatis"); setPartCount(entry.partCount || 2); setAspectRatio(entry.aspectRatio || "16:9"); 
            setStoryboard(entry.storyboard || []); setImageRevisionInputs(entry.imageRevisionInputs || {}); setMotionRevisionInputs(entry.motionRevisionInputs || {});
            setVideoEngines({}); 
            setIsHistoryOpen(false); setHistorySuccessMsg("Proyek lama berhasil dimuat dari Cloud!"); setTimeout(() => setHistorySuccessMsg(""), 3000);
          };

          const deleteHistory = async (id) => {
            if (!user || !db) return;
            try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'history', id.toString())); } catch (e) {}
          };

          const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
              try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || `HTTP error! status: ${response.status}`);
                }
                return await response.json();
              } catch (err) {
                if (i === retries - 1) throw err;
                await new Promise(res => setTimeout(res, delays[i]));
              }
            }
          };

          const handleGlobalFaceUpload = async (char, event) => {
            const files = Array.from(event.target.files);
            if (!files.length) return;
            const readAsDataURL = (file) => new Promise((resolve) => {
              const reader = new FileReader();
              reader.onloadend = () => resolve({ fileName: file.name, file: file, previewUrl: reader.result, base64: reader.result.split(',')[1], mimeType: file.type });
              reader.readAsDataURL(file);
            });
            const processedFiles = await Promise.all(files.map(readAsDataURL));
            setGlobalFaceRefs(prev => {
              const currentRefs = prev[char] || [];
              const newRefsToAdd = processedFiles.map((file, idx) => ({ ...file, partLabel: `Part ${currentRefs.length + idx + 1}` }));
              const newRefs = [...currentRefs, ...newRefsToAdd].slice(0, 5); 
              return { ...prev, [char]: newRefs };
            });
          };

          const removeGlobalFace = (char, index) => { setGlobalFaceRefs(prev => { const newRefs = [...(prev[char] || [])]; newRefs.splice(index, 1); return { ...prev, [char]: newRefs }; }); };
          const updateGlobalFaceLabel = (char, index, newValue) => { setGlobalFaceRefs(prev => { const newRefs = [...(prev[char] || [])]; newRefs[index] = { ...newRefs[index], partLabel: newValue }; return { ...prev, [char]: newRefs }; }); };

          const handleAdditionalAssetUpload = async (slotId, event) => {
            const files = Array.from(event.target.files);
            if (!files.length) return;
            const readAsDataURL = (file) => new Promise((resolve) => {
              const reader = new FileReader();
              reader.onloadend = () => resolve({ fileName: file.name, file: file, previewUrl: reader.result, base64: reader.result.split(',')[1], mimeType: file.type });
              reader.readAsDataURL(file);
            });
            const processedFiles = await Promise.all(files.map(readAsDataURL));
            setAdditionalAssetRefs(prev => {
              const currentRefs = prev[slotId] || [];
              const newRefsToAdd = processedFiles.map((file, idx) => ({ ...file, partLabel: `Aset ${slotId}` }));
              const newRefs = [...currentRefs, ...newRefsToAdd].slice(0, 5); 
              return { ...prev, [slotId]: newRefs };
            });
          };

          const removeAdditionalAsset = (slotId, index) => { setAdditionalAssetRefs(prev => { const newRefs = [...(prev[slotId] || [])]; newRefs.splice(index, 1); return { ...prev, [slotId]: newRefs }; }); };
          const updateAdditionalAssetLabel = (slotId, index, newValue) => { setAdditionalAssetRefs(prev => { const newRefs = [...(prev[slotId] || [])]; newRefs[index] = { ...newRefs[index], partLabel: newValue }; return { ...prev, [slotId]: newRefs }; }); };

          const handleLocalFaceUpload = async (shotIndex, event) => {
            const files = Array.from(event.target.files);
            if (!files.length) return;
            const readAsDataURL = (file) => new Promise((resolve) => {
              const reader = new FileReader();
              reader.onloadend = () => resolve({ fileName: file.name, file: file, previewUrl: reader.result, base64: reader.result.split(',')[1], mimeType: file.type, partLabel: 'Local Override' });
              reader.readAsDataURL(file);
            });
            const processedFiles = await Promise.all(files.map(readAsDataURL));
            setStoryboard(prev => {
              const newBoard = [...prev]; const shot = newBoard[shotIndex];
              let currentRefs = [shot.faceReference1, shot.faceReference2, shot.faceReference3, shot.faceReference4, shot.faceReference5].filter(Boolean);
              currentRefs = [...currentRefs, ...processedFiles].slice(0, 5); 
              newBoard[shotIndex] = { ...shot, needsFaceReference: true, faceReference1: currentRefs[0] || null, faceReference2: currentRefs[1] || null, faceReference3: currentRefs[2] || null, faceReference4: currentRefs[3] || null, faceReference5: currentRefs[4] || null };
              return newBoard;
            });
          };

          const removeLocalFace = (shotIndex, refIndex) => {
            setStoryboard(prev => {
              const newBoard = [...prev]; const shot = newBoard[shotIndex];
              let currentRefs = [shot.faceReference1, shot.faceReference2, shot.faceReference3, shot.faceReference4, shot.faceReference5].filter(Boolean);
              currentRefs.splice(refIndex, 1);
              newBoard[shotIndex] = { ...shot, faceReference1: currentRefs[0] || null, faceReference2: currentRefs[1] || null, faceReference3: currentRefs[2] || null, faceReference4: currentRefs[3] || null, faceReference5: currentRefs[4] || null };
              return newBoard;
            });
          };

          const handleGhostToggle = (ghostKey) => { setSelectedGhosts(prev => prev.includes(ghostKey) ? prev.filter(g => g !== ghostKey) : [...prev, ghostKey]); };
          const handleImagePromptManualEdit = (index, value) => { setStoryboard(prev => { const arr = [...prev]; arr[index] = { ...arr[index], imagePrompt: value }; return arr; }); };
          const handleMotionPromptManualEdit = (index, value) => { setStoryboard(prev => { const arr = [...prev]; arr[index] = { ...arr[index], motionPrompt: value }; return arr; }); };
          const handleVideoEngineChange = (index, value) => { setVideoEngines(prev => ({ ...prev, [index]: value })); };

          const getSystemPromptText = () => {
            let charInstruction = "";
            if (characterCount === "1") charInstruction = `STRICT CHARACTER DEFINITION: EXACTLY 1 main character (A). Explicitly define their GENDER, age, and distinct outfit. A is always A.`;
            else if (characterCount === "2") charInstruction = `STRICT CHARACTER DEFINITION: EXACTLY 2 main characters (A and B). Explicitly define their GENDERS and distinct outfits. NEVER swap their identities.`;
            else charInstruction = `STRICT CHARACTER DEFINITION: Analyze main characters (max 5). Assign identifiers: A, B, C, D, E. Explicitly define GENDERS and distinct outfits. NEVER mix up genders.`;

            let alternatingInstruction = "";
            if (isAlternatingCharacters && characterCount !== "1") {
              alternatingInstruction = `3. STRICT ALTERNATING & INSERT SHOTS: 
               - Explicitly alternate focus (Shot 1: A, Shot 2: B).
               - INSERT SHOTS MANDATORY: At least 1 shot per part MUST be an Insert/B-Roll shot (e.g., macro shot). Set 'needsFaceReference' false and 'focusedCharacters' [].
               - MAPPING CRITICAL: Map CORRECTLY in 'focusedCharacters'.`;
            } else {
              alternatingInstruction = `3. SHOT VARIETY & INSERT SHOTS: 
               - INSERT SHOTS MANDATORY: At least 1 shot per part MUST be an Insert/B-Roll shot (e.g., close-up of shoes). Set 'needsFaceReference' false and 'focusedCharacters' [].
               - MAPPING CRITICAL: Map CORRECTLY in 'focusedCharacters'.`;
            }

            let partInstruction = partCount === "Otomatis" 
              ? `Analyze the user's idea and dynamically break down the sequence into an appropriate number of individual shots based on the story's complexity. There is NO maximum limit.` 
              : `You must break down the sequence into EXACTLY ${partCount} individual shots. DO NOT generate more than ${partCount} shots.`;

            let ghostInstruction = "";
            if (genre === "Indonesian Horror (Mistik Lokal Nusantara)" && selectedGhosts.length > 0) {
              const ghostDetails = selectedGhosts.map(g => `${g}: ${GHOST_PROMPTS[g]}`).join("\n");
              ghostInstruction = `\nCRITICAL INDONESIAN HORROR DIRECTIVE: The user has selected specific local entities for this story. You MUST feature them logically in the storyboard and use these EXACT visual descriptions:\n${ghostDetails}\n`;
            }

            return `You are a WORLD-CLASS, OSCAR-WINNING cinematic director and master visual storyteller. The user will provide a scene idea and a chosen genre: "${genre}".
            Your primary goal is to craft a storyline with FLAWLESS LOGIC, gripping pacing, and a clear cause-and-effect narrative progression. Every single shot must logically connect to the next.

            STORYTELLING, LOGIC & CINEMATOGRAPHY DIRECTIVE:
            1. Cause and Effect: Action A must lead logically to Reaction B.
            2. Cinematic Pacing: Build tension naturally. Use establishing shots, medium shots, and close-ups intelligently.
            3. Spatial Geography: Maintain a logical understanding of where characters are positioned relative to each other.
            4. Insert Shots (B-Roll): An Oscar-winning director knows that not every shot shows a face. You MUST use insert shots (e.g., macro shot of boots stepping on a puddle, a ticking clock) to build atmosphere without showing the character's faces.
            ${ghostInstruction}

            You MUST strictly adhere to the visual aesthetic, lighting, and mood of the "${genre}" genre.
            
            CRITICAL CONSISTENCY DIRECTIVE (MANDATORY FOR AI IMAGE STABILITY):
            1. MASTER ENVIRONMENT: Define the specific location, lighting, and weather ONCE. You MUST reuse these EXACT words in every single shot that takes place in this location.
            2. MASTER CHARACTER(S): Define Character A (and B, C...) with exact gender, age, ethnicity, facial features, hair, and clothing. You MUST reuse this EXACT word-for-word description in EVERY shot they appear in.
            ${alternatingInstruction}
            
            ULTRA-REALISM DIRECTIVE:
            Make the imagePrompt EXTREMELY detailed. Include cinematic lighting like "dramatic rim lighting", "shallow depth of field with bokeh background".

            ${charInstruction}
            ${partInstruction} 
            
            For each shot, provide:
            1. shotNumber: e.g., "SCENE 1", "SCENE 2"
            2. timecode: Estimate the timecode range.
            3. needsFaceReference: BOOLEAN. (MUST BE false for Insert/Environment shots).
            4. focusedCharacters: ARRAY of STRINGS (e.g., ["A", "B"], ["A"], or [] for insert shots).
            5. hasFemaleCharacter: BOOLEAN.
            6. imagePrompt: Single, highly detailed paragraph. MUST include the Master Character/Environment strings.

        [IF needsFaceReference IS true, START EXACTLY WITH THIS LINE]:

                            <div key={index} className="flex flex-col md:flex-row border-b border-white/20 relative">
                              {isRendering && (
                                <div className="absolute inset-0 z-50 bg-[#000]/85 flex flex-col items-center justify-center">
                                  <span className="text-[#FFC000] font-bold text-[14px] animate-pulse">PROCESSING...</span>
                                </div>
                              )}

                              <div className="w-full md:w-[12%] flex flex-col items-center justify-center p-4 border-r border-white/20 bg-[#050505]">
                                 <span className="font-black text-4xl text-white">{(index + 1).toString().padStart(2, '0')}</span>
                                 <div className="flex flex-wrap justify-center gap-1 w-full px-1 mt-4">
                                   {refsForShot.map((ref, i) => (
                                      <div key={i} className="relative w-7 h-7"><img src={ref.previewUrl} className="w-full h-full object-cover border border-[#FFC000]/40" /></div>
                                   ))}
                                   {refsForShot.length < 5 && (
                                     <label className="w-7 h-7 border border-dashed border-white/30 flex items-center justify-center cursor-pointer bg-white/5"><input type="file" multiple accept="image/*" onChange={(e) => handleLocalFaceUpload(index, e)} className="hidden" /><span className="text-[10px] text-gray-500">+</span></label>
                                   )}
                                 </div>
                              </div>
                              
                              <div className="w-full md:w-[33%] p-4 border-r border-white/20 flex flex-col">
                                 <textarea value={shot.motionPrompt} onChange={(e) => handleMotionPromptManualEdit(index, e.target.value)} className="text-[11px] text-gray-300 bg-transparent w-full h-full min-h-[120px] resize-none border border-transparent focus:border-white/10" />
                                 <div className="mt-auto bg-[#111] p-2 rounded border border-white/10 mt-4">
                                    <label className="block text-[9px] text-[#FFC000] font-bold mb-1.5 uppercase">Generate Video</label>
                                    <div className="flex gap-2">
                                      <select value={currentVideoEngine} onChange={(e) => handleVideoEngineChange(index, e.target.value)} className="bg-[#050505] border border-white/20 rounded p-2 text-[10px] text-white w-1/2">
                                        <option value="Veo3 Lite">Veo3 Lite</option>
                                        <option value="Gemini Omni">Gemini Omni</option>
                                      </select>
                                      <button onClick={() => generateVideo(index)} disabled={!shot.imageUrl} className={`w-1/2 font-black py-2 rounded-sm text-[10px] ${!shot.imageUrl ? 'bg-gray-800 text-gray-500' : 'bg-[#FFC000] text-black hover:bg-yellow-500'}`}>GENERATE</button>
                                    </div>
                                 </div>
                              </div>

                              <div className="w-full md:w-[25%] p-4 border-r border-white/20 bg-[#050505] flex flex-col">
                                 <textarea value={shot.imagePrompt} onChange={(e) => handleImagePromptManualEdit(index, e.target.value)} className="text-[10px] text-gray-200 bg-[#2a0505] border border-red-600/60 w-full min-h-[120px] resize-none p-2 mb-2" />
                                 <button onClick={() => generateImage(index)} className="w-full font-black py-2.5 rounded-sm bg-transparent border border-[#FFC000] text-[#FFC000] hover:bg-[#FFC000] hover:text-black mt-auto text-[10px]">GENERATE IMAGE</button>
                              </div>

                              <div className="w-full md:w-[30%] bg-[#000] p-1 flex items-center justify-center relative group">
                                 {shot.imageUrl ? (
                                    <div className="relative w-full h-full min-h-[180px] bg-black">
                                       {shot.videoUrl && showVideoPreview[index] ? (
                                          <video src={shot.videoUrl} className="w-full h-full object-cover" controls autoPlay loop muted />
                                       ) : (
                                          <img src={shot.imageUrl} className="w-full h-full object-cover cursor-pointer" onClick={() => setPreviewImage({ url: shot.imageUrl })} />
                                       )}
                                       {shot.videoUrl && shot.imageUrl && (
                                          <button onClick={() => setShowVideoPreview(prev => ({ ...prev, [index]: !prev[index] }))} className="absolute bottom-2 right-2 bg-black/60 text-white text-[9px] px-2 py-1 rounded border border-white/20">Toggle Video</button>
                                        )}
                                    </div>
                                 ) : (
                                    <div className="w-full h-full min-h-[180px] bg-[#050505] border border-white/5 flex items-center justify-center"><span className="text-[10px] text-gray-600">NO RESULT</span></div>
                                 )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                </div>
              </main>

              {previewImage && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4" onClick={() => setPreviewImage(null)}>
                    <img src={previewImage.url} className="w-full h-auto max-h-[80vh] object-contain" />
                </div>
              )}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
